<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance Pro Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        .nav-item-active { color: #3b82f6; }
        .nav-item-active i { transform: translateY(-4px); transition: all 0.3s ease; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-animate { animation: slideUp 0.3s ease-out; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .loading-overlay { background: rgba(255,255,255,0.8); position: fixed; inset: 0; z-index: 200; display: flex; items-center; justify-center; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans selection:bg-blue-100">

    <div id="global-loader" class="hidden loading-overlay">
        <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <div id="login-screen" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <div class="inline-flex p-4 bg-blue-600 rounded-3xl shadow-lg shadow-blue-200 mb-6">
                <i data-lucide="wallet" class="w-10 h-10 text-white"></i>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight">Finance Pro</h1>
            <p class="text-slate-400 mt-2 mb-10">Database terhubung ke Google Sheets</p>
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition">
                Masuk ke Dashboard
            </button>
        </div>
    </div>

    <div id="main-app" class="hidden pb-32">
        <header class="glass sticky top-0 z-40 px-5 py-4 flex justify-between items-center border-b border-slate-100">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                    <i data-lucide="trending-up" class="w-5 h-5 text-white"></i>
                </div>
                <span class="font-bold text-lg tracking-tight">FinancePro</span>
            </div>
            <button onclick="logout()" class="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-full text-slate-600">
                <i data-lucide="log-out" class="w-5 h-5"></i>
            </button>
        </header>

        <main class="p-5 space-y-6">
            <div id="home-balance-card" class="bg-blue-600 rounded-[2rem] p-6 text-white shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <p class="opacity-80 text-sm font-medium">Total Saldo Anda</p>
                    <h2 id="total-balance" class="text-3xl font-bold mt-1">Rp 0</h2>
                    <div class="grid grid-cols-2 gap-4 mt-6">
                        <div class="bg-white/10 p-3 rounded-2xl backdrop-blur-md">
                            <p class="text-[10px] uppercase opacity-70">Pemasukan</p>
                            <p id="total-income" class="font-bold text-sm">Rp 0</p>
                        </div>
                        <div class="bg-white/10 p-3 rounded-2xl backdrop-blur-md">
                            <p class="text-[10px] uppercase opacity-70">Pengeluaran</p>
                            <p id="total-expense" class="font-bold text-sm">Rp 0</p>
                        </div>
                    </div>
                </div>
                <i data-lucide="circle-dashed" class="absolute -right-10 -bottom-10 w-40 h-40 opacity-10 rotate-12"></i>
            </div>

            <div id="content-container">
                <div id="view-transactions" class="view-content space-y-4">
                    <div class="flex items-center justify-between">
                        <h3 class="font-bold text-lg text-slate-800">Transaksi Terakhir</h3>
                        <button onclick="exportToPDF()" class="text-blue-600 text-sm font-semibold flex items-center gap-1">
                            <i data-lucide="download" class="w-4 h-4"></i> PDF
                        </button>
                    </div>
                    <div id="transaction-list-mobile" class="space-y-3"></div>
                </div>

                <div id="view-debts" class="view-content hidden space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-red-50 p-4 rounded-3xl border border-red-100">
                            <p class="text-[10px] font-black text-red-400 uppercase">Total Utang</p>
                            <p id="total-debt-sum" class="text-lg font-black text-red-600">Rp 0</p>
                        </div>
                        <div class="bg-blue-50 p-4 rounded-3xl border border-blue-100">
                            <p class="text-[10px] font-black text-blue-400 uppercase">Total Piutang</p>
                            <p id="total-receivable-sum" class="text-lg font-black text-blue-600">Rp 0</p>
                        </div>
                    </div>
                    <div class="flex justify-between items-center">
                        <h3 class="font-bold text-lg">Daftar Catatan</h3>
                        <button onclick="openModal('debt')" class="bg-orange-600 text-white px-4 py-2 rounded-xl text-xs font-bold">Catat</button>
                    </div>
                    <div id="debt-list-mobile" class="space-y-3"></div>
                </div>

                <div id="view-analytics" class="view-content hidden space-y-6">
                    <h3 class="font-bold text-lg">Analisis Keuangan</h3>
                    <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-50">
                        <p class="text-sm font-bold mb-4 text-slate-500 uppercase text-[10px]">Arus Kas</p>
                        <canvas id="monthlyChart"></canvas>
                    </div>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 glass border-t flex justify-around items-center px-2 py-3 safe-area-bottom z-50">
            <button onclick="switchTab('transactions')" class="nav-btn flex flex-col items-center gap-1 flex-1 nav-item-active" data-view="transactions">
                <i data-lucide="layout-grid" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold">Beranda</span>
            </button>
            <button onclick="switchTab('debts')" class="nav-btn flex flex-col items-center gap-1 flex-1 text-slate-400" data-view="debts">
                <i data-lucide="clipboard-list" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold">Utang</span>
            </button>
            <div class="relative -top-6">
                <button onclick="openModal('transaction')" class="bg-blue-600 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition">
                    <i data-lucide="plus" class="w-8 h-8"></i>
                </button>
            </div>
            <button onclick="switchTab('analytics')" class="nav-btn flex flex-col items-center gap-1 flex-1 text-slate-400" data-view="analytics">
                <i data-lucide="pie-chart" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold">Grafik</span>
            </button>
            <button onclick="switchTab('ai')" class="nav-btn flex flex-col items-center gap-1 flex-1 text-slate-400" data-view="ai">
                <i data-lucide="bot" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold">AI Tips</span>
            </button>
        </nav>
    </div>

    <div id="modal-overlay" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-[60] flex items-end">
        <div id="modal-transaction" class="bg-white rounded-t-[2.5rem] w-full p-8 modal-animate hidden">
            <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto mb-6"></div>
            <h3 class="text-xl font-bold mb-6">Tambah Transaksi</h3>
            <div class="space-y-4">
                <div class="flex bg-slate-100 p-1 rounded-2xl">
                    <button onclick="setModalType('pemasukan')" id="type-inc" class="flex-1 py-3 rounded-xl text-sm font-bold bg-white shadow-sm">Pemasukan</button>
                    <button onclick="setModalType('pengeluaran')" id="type-exp" class="flex-1 py-3 rounded-xl text-sm font-bold text-slate-500">Pengeluaran</button>
                </div>
                <input type="hidden" id="t-type" value="pemasukan">
                <input type="date" id="t-date" class="w-full p-4 bg-slate-100 border-none rounded-2xl outline-none">
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 font-bold text-slate-400">Rp</span>
                    <input type="number" id="t-amount" class="w-full p-4 pl-12 bg-slate-100 border-none rounded-2xl outline-none font-bold" placeholder="0">
                </div>
                <input type="text" id="t-category" class="w-full p-4 bg-slate-100 border-none rounded-2xl outline-none" placeholder="Kategori">
                <input type="text" id="t-note" class="w-full p-4 bg-slate-100 border-none rounded-2xl outline-none" placeholder="Catatan">
                <div class="flex gap-3 pt-4">
                    <button onclick="closeModal()" class="flex-1 py-4 bg-slate-100 rounded-2xl font-bold">Batal</button>
                    <button onclick="saveTransaction()" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold">Simpan</button>
                </div>
            </div>
        </div>

        <div id="modal-debt" class="bg-white rounded-t-[2.5rem] w-full p-8 modal-animate hidden">
            <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto mb-6"></div>
            <h3 class="text-xl font-bold mb-6">Catat Utang/Piutang</h3>
            <div class="space-y-4">
                <select id="d-type" class="w-full p-4 bg-slate-100 border-none rounded-2xl outline-none font-bold">
                    <option value="utang">Utang (Saya Meminjam)</option>
                    <option value="piutang">Piutang (Orang Meminjam)</option>
                </select>
                <input type="text" id="d-name" class="w-full p-4 bg-slate-100 border-none rounded-2xl outline-none" placeholder="Nama Orang">
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 font-bold text-slate-400">Rp</span>
                    <input type="number" id="d-amount" class="w-full p-4 pl-12 bg-slate-100 border-none rounded-2xl outline-none font-bold" placeholder="0">
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="closeModal()" class="flex-1 py-4 bg-slate-100 rounded-2xl font-bold">Batal</button>
                    <button onclick="saveDebt()" class="flex-1 py-4 bg-orange-600 text-white rounded-2xl font-bold">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // GANTI INI DENGAN URL WEB APP DARI GOOGLE APPS SCRIPT
        const SCRIPT_URL = "URL_WEB_APP_ANDA"; 
        
        let dataStore = { transactions: [], debts: [] };

        window.onload = function() {
            lucide.createIcons();
            document.getElementById('t-date').valueAsDate = new Date();
        };

        function showLoader(show) {
            document.getElementById('global-loader').style.display = show ? 'flex' : 'none';
        }

        async function handleLogin() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').classList.remove('hidden');
            await loadInitialData();
        }

        function logout() { location.reload(); }

        async function loadInitialData() {
            showLoader(true);
            try {
                const response = await fetch(SCRIPT_URL);
                dataStore = await response.json();
                refreshUI();
            } catch (e) {
                alert("Gagal mengambil data dari Google Sheets.");
            }
            showLoader(false);
        }

        function refreshUI() {
            updateSummary();
            renderTransactions();
            renderDebts();
            lucide.createIcons();
        }

        function updateSummary() {
            const inc = dataStore.transactions.filter(t => t.type === 'pemasukan').reduce((a, b) => a + Number(b.amount), 0);
            const exp = dataStore.transactions.filter(t => t.type === 'pengeluaran').reduce((a, b) => a + Number(b.amount), 0);
            
            document.getElementById('total-balance').innerText = `Rp ${(inc - exp).toLocaleString('id-ID')}`;
            document.getElementById('total-income').innerText = `Rp ${inc.toLocaleString('id-ID')}`;
            document.getElementById('total-expense').innerText = `Rp ${exp.toLocaleString('id-ID')}`;

            const utang = dataStore.debts.filter(d => d.type === 'utang').reduce((a, b) => a + Number(b.amount), 0);
            const piutang = dataStore.debts.filter(d => d.type === 'piutang').reduce((a, b) => a + Number(b.amount), 0);
            
            document.getElementById('total-debt-sum').innerText = `Rp ${utang.toLocaleString('id-ID')}`;
            document.getElementById('total-receivable-sum').innerText = `Rp ${piutang.toLocaleString('id-ID')}`;
        }

        function renderTransactions() {
            const container = document.getElementById('transaction-list-mobile');
            if(dataStore.transactions.length === 0) {
                container.innerHTML = '<p class="text-center py-10 text-slate-400">Kosong</p>';
                return;
            }
            container.innerHTML = dataStore.transactions.map(t => `
                <div class="bg-white p-4 rounded-3xl flex items-center gap-4 shadow-sm border border-slate-50">
                    <div class="w-12 h-12 rounded-2xl flex items-center justify-center ${t.type === 'pemasukan' ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'}">
                        <i data-lucide="${t.type === 'pemasukan' ? 'arrow-down-left' : 'arrow-up-right'}" class="w-6 h-6"></i>
                    </div>
                    <div class="flex-1">
                        <h5 class="font-bold text-sm text-slate-800">${t.note}</h5>
                        <p class="text-[10px] text-slate-400">${t.category} • ${t.dateDisplay}</p>
                    </div>
                    <p class="font-black text-sm ${t.type === 'pemasukan' ? 'text-green-600' : 'text-red-600'}">
                        ${t.type === 'pemasukan' ? '+' : '-'} ${Number(t.amount).toLocaleString('id-ID')}
                    </p>
                    <button onclick="deleteItem('transactions', '${t.id}')" class="text-slate-300 ml-2"><i data-lucide="x-circle" class="w-5 h-5"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function renderDebts() {
            const container = document.getElementById('debt-list-mobile');
            container.innerHTML = dataStore.debts.map(d => `
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-50 flex justify-between items-center">
                    <div>
                        <p class="text-[10px] font-black uppercase ${d.type === 'utang' ? 'text-red-400' : 'text-blue-400'}">${d.type}</p>
                        <h5 class="font-bold text-slate-800">${d.name}</h5>
                        <p class="text-lg font-black">Rp ${Number(d.amount).toLocaleString('id-ID')}</p>
                    </div>
                    <button onclick="deleteItem('debts', '${d.id}')" class="w-10 h-10 bg-slate-50 text-slate-300 rounded-full flex items-center justify-center">
                        <i data-lucide="check" class="w-5 h-5"></i>
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function saveTransaction() {
            const amount = document.getElementById('t-amount').value;
            const date = document.getElementById('t-date').value;
            if(!amount || !date) return;

            const dateDisplay = new Date(date).toLocaleDateString('id-ID', {day:'numeric', month:'short', year:'numeric'});
            const row = [Date.now(), date, dateDisplay, document.getElementById('t-type').value, amount, document.getElementById('t-category').value || 'Umum', document.getElementById('t-note').value || 'Transaksi'];
            
            showLoader(true);
            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'add', sheet: 'transactions', row: row })
            });
            await loadInitialData();
            closeModal();
        }

        async function saveDebt() {
            const amount = document.getElementById('d-amount').value;
            const name = document.getElementById('d-name').value;
            if(!amount || !name) return;

            const row = [Date.now(), document.getElementById('d-type').value, name, amount];
            
            showLoader(true);
            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'add', sheet: 'debts', row: row })
            });
            await loadInitialData();
            closeModal();
        }

        async function deleteItem(sheetName, id) {
            if(!confirm("Hapus data ini?")) return;
            showLoader(true);
            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'delete', sheet: sheetName, id: id })
            });
            await loadInitialData();
        }

        // --- UI Logic (Switch Tab, Modal, dll) ---
        function switchTab(viewId) {
            document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${viewId}`).classList.remove('hidden');
            document.getElementById('home-balance-card').style.display = (viewId === 'transactions') ? 'block' : 'none';
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('nav-item-active', 'text-blue-600');
                btn.classList.add('text-slate-400');
                if(btn.dataset.view === viewId) btn.classList.add('nav-item-active', 'text-blue-600');
            });
            if(viewId === 'analytics') renderCharts();
            lucide.createIcons();
        }

        function openModal(type) {
            document.getElementById('modal-overlay').classList.remove('hidden');
            document.getElementById(`modal-${type}`).classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.add('hidden');
            document.getElementById('modal-transaction').classList.add('hidden');
            document.getElementById('modal-debt').classList.add('hidden');
        }

        function setModalType(type) {
            document.getElementById('t-type').value = type;
            const incBtn = document.getElementById('type-inc');
            const expBtn = document.getElementById('type-exp');
            if(type === 'pemasukan') {
                incBtn.className = "flex-1 py-3 rounded-xl text-sm font-bold bg-white shadow-sm";
                expBtn.className = "flex-1 py-3 rounded-xl text-sm font-bold text-slate-500";
            } else {
                expBtn.className = "flex-1 py-3 rounded-xl text-sm font-bold bg-white shadow-sm";
                incBtn.className = "flex-1 py-3 rounded-xl text-sm font-bold text-slate-500";
            }
        }

        let mChart;
        function renderCharts() {
            const ctx1 = document.getElementById('monthlyChart').getContext('2d');
            if(mChart) mChart.destroy();
            const inc = dataStore.transactions.filter(t=>t.type==='pemasukan').reduce((a,b)=>a+Number(b.amount),0);
            const exp = dataStore.transactions.filter(t=>t.type==='pengeluaran').reduce((a,b)=>a+Number(b.amount),0);
            mChart = new Chart(ctx1, {
                type: 'bar',
                data: { labels: ['Arus Kas'], datasets: [
                    { label: 'Masuk', data: [inc], backgroundColor: '#10b981', borderRadius: 12 },
                    { label: 'Keluar', data: [exp], backgroundColor: '#ef4444', borderRadius: 12 }
                ]},
                options: { responsive: true }
            });
        }
    </script>
</body>
</html>
