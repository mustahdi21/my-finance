<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance Pro Mobile - Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        .nav-item-active { color: #3b82f6; }
        .nav-item-active i { transform: translateY(-4px); transition: all 0.3s ease; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-animate { animation: slideUp 0.3s ease-out; }
        .loading-overlay { background: rgba(255,255,255,0.8); position: fixed; inset: 0; z-index: 200; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 10px; }
        .filter-chip { transition: all 0.2s; border: 1px solid #e2e8f0; }
        .filter-chip.active { background: #3b82f6; color: white; border-color: #3b82f6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">

    <div id="global-loader" class="hidden loading-overlay">
        <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-xs font-bold text-blue-600 animate-pulse">Mohon Tunggu...</p>
    </div>

    <div id="login-screen" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <div class="inline-flex p-4 bg-blue-600 rounded-3xl shadow-lg mb-6">
                <i data-lucide="wallet" class="w-10 h-10 text-white"></i>
            </div>
            <h1 class="text-3xl font-extrabold">Finance Pro</h1>
            <p class="text-slate-400 mt-2 mb-10">Kelola keuangan aman di Google Sheets</p>
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition">
                Masuk Sekarang
            </button>
        </div>
    </div>

    <div id="main-app" class="hidden pb-32">
        <header class="glass sticky top-0 z-40 px-5 py-4 flex justify-between items-center border-b border-slate-100">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                    <i data-lucide="trending-up" class="w-5 h-5 text-white"></i>
                </div>
                <span class="font-bold text-lg">My-Finance</span>
            </div>
            <button onclick="logout()" class="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-full text-slate-600">
                <i data-lucide="log-out" class="w-5 h-5"></i>
            </button>
        </header>

        <main class="p-5 space-y-6">
            <div id="home-balance-card" class="bg-blue-600 rounded-[2.5rem] p-7 text-white shadow-xl relative overflow-hidden transition-all duration-500">
                <div class="relative z-10">
                    <p class="opacity-80 text-sm font-medium">Saldo Periode Ini</p>
                    <h2 id="total-balance" class="text-3xl font-bold mt-1">Rp 0</h2>
                    <div class="grid grid-cols-2 gap-4 mt-6">
                        <div class="bg-white/10 p-3 rounded-2xl backdrop-blur-md">
                            <p class="text-[10px] uppercase opacity-70 font-bold">In</p>
                            <p id="total-income" class="font-bold text-sm">Rp 0</p>
                        </div>
                        <div class="bg-white/10 p-3 rounded-2xl backdrop-blur-md">
                            <p class="text-[10px] uppercase opacity-70 font-bold">Out</p>
                            <p id="total-expense" class="font-bold text-sm">Rp 0</p>
                        </div>
                    </div>
                </div>
                <i data-lucide="circle-dashed" class="absolute -right-10 -bottom-10 w-40 h-40 opacity-10 rotate-12"></i>
            </div>

            <div id="content-container">
                <div id="view-transactions" class="view-content space-y-4">
                    <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 space-y-3">
                        <div class="flex items-center justify-between">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-wider">Rentang Tanggal</p>
                            <button onclick="resetFilters()" class="text-blue-600 text-[10px] font-bold">RESET</button>
                        </div>
                        <div class="flex items-center gap-2">
                            <input type="date" id="filter-start" onchange="renderTransactions()" class="flex-1 text-xs p-2 bg-slate-50 rounded-xl border-none outline-none">
                            <span class="text-slate-300">-</span>
                            <input type="date" id="filter-end" onchange="renderTransactions()" class="flex-1 text-xs p-2 bg-slate-50 rounded-xl border-none outline-none">
                        </div>
                        <button onclick="exportToPDF()" class="w-full bg-slate-800 text-white py-2 rounded-xl text-xs font-bold flex items-center justify-center gap-2">
                            <i data-lucide="file-text" class="w-4 h-4"></i> Simpan ke PDF
                        </button>
                    </div>
                    <div id="transaction-list-mobile" class="space-y-3"></div>
                </div>

                <div id="view-debts" class="view-content hidden space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-red-50 p-4 rounded-3xl border border-red-100">
                            <p class="text-[10px] font-black text-red-400 uppercase">Utang</p>
                            <p id="total-debt-sum" class="text-lg font-black text-red-600">Rp 0</p>
                        </div>
                        <div class="bg-blue-50 p-4 rounded-3xl border border-blue-100">
                            <p class="text-[10px] font-black text-blue-400 uppercase">Piutang</p>
                            <p id="total-receivable-sum" class="text-lg font-black text-blue-600">Rp 0</p>
                        </div>
                    </div>
                    
                    <div class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                        <button onclick="filterDebtTab('all')" id="d-chip-all" class="filter-chip active px-4 py-2 rounded-full text-[10px] font-bold whitespace-nowrap">Semua</button>
                        <button onclick="filterDebtTab('utang')" id="d-chip-utang" class="filter-chip px-4 py-2 rounded-full text-[10px] font-bold whitespace-nowrap">Utang Saya</button>
                        <button onclick="filterDebtTab('piutang')" id="d-chip-piutang" class="filter-chip px-4 py-2 rounded-full text-[10px] font-bold whitespace-nowrap">Piutang Orang</button>
                    </div>

                    <div id="debt-list-mobile" class="space-y-3"></div>
                </div>

                <div id="view-analytics" class="view-content hidden space-y-6">
                    <h3 class="font-bold text-lg">Grafik Keuangan</h3>
                    <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                        <canvas id="monthlyChart"></canvas>
                    </div>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 glass border-t flex justify-around items-center px-2 py-3 safe-area-bottom z-50">
            <button onclick="switchTab('transactions')" class="nav-btn flex flex-col items-center gap-1 flex-1 nav-item-active" data-view="transactions">
                <i data-lucide="layout-grid" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold">Riwayat</span>
            </button>
            <button onclick="switchTab('debts')" class="nav-btn flex flex-col items-center gap-1 flex-1 text-slate-400" data-view="debts">
                <i data-lucide="clipboard-list" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold">Utang</span>
            </button>
            <div class="relative -top-6">
                <button onclick="openModal('transaction')" class="bg-blue-600 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition">
                    <i data-lucide="plus" class="w-8 h-8"></i>
                </button>
            </div>
            <button onclick="switchTab('analytics')" class="nav-btn flex flex-col items-center gap-1 flex-1 text-slate-400" data-view="analytics">
                <i data-lucide="pie-chart" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold">Grafik</span>
            </button>
            <button onclick="openModal('debt')" class="nav-btn flex flex-col items-center gap-1 flex-1 text-slate-400">
                <i data-lucide="user-plus" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold">Pinjam</span>
            </button>
        </nav>
    </div>

    <div id="modal-overlay" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-[60] flex items-end">
        <div id="modal-transaction" class="bg-white rounded-t-[2.5rem] w-full p-8 modal-animate hidden">
            <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto mb-6"></div>
            <h3 id="modal-t-title" class="text-xl font-bold mb-6">Tambah Transaksi</h3>
            <div class="space-y-4">
                <div class="flex bg-slate-100 p-1 rounded-2xl">
                    <button onclick="setModalType('pemasukan')" id="type-inc" class="flex-1 py-3 rounded-xl text-sm font-bold bg-white shadow-sm">Pemasukan</button>
                    <button onclick="setModalType('pengeluaran')" id="type-exp" class="flex-1 py-3 rounded-xl text-sm font-bold text-slate-500">Pengeluaran</button>
                </div>
                <input type="hidden" id="t-type" value="pemasukan">
                <input type="date" id="t-date" class="w-full p-4 bg-slate-100 border-none rounded-2xl outline-none">
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 font-bold text-slate-400">Rp</span>
                    <input type="number" id="t-amount" class="w-full p-4 pl-12 bg-slate-100 border-none rounded-2xl outline-none font-bold" placeholder="0">
                </div>
                <input type="text" id="t-category" class="w-full p-4 bg-slate-100 border-none rounded-2xl outline-none" placeholder="Kategori">
                <input type="text" id="t-note" class="w-full p-4 bg-slate-100 border-none rounded-2xl outline-none" placeholder="Keterangan">
                <div class="flex gap-3 pt-4">
                    <button onclick="closeModal()" class="flex-1 py-4 bg-slate-100 rounded-2xl font-bold">Batal</button>
                    <button onclick="saveTransaction()" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg">Simpan</button>
                </div>
            </div>
        </div>

        <div id="modal-debt" class="bg-white rounded-t-[2.5rem] w-full p-8 modal-animate hidden">
            <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto mb-6"></div>
            <h3 id="modal-d-title" class="text-xl font-bold mb-6">Catat Pinjaman</h3>
            <div class="space-y-4">
                <select id="d-type" class="w-full p-4 bg-slate-100 border-none rounded-2xl outline-none font-bold">
                    <option value="utang">Utang (Saya Pinjam)</option>
                    <option value="piutang">Piutang (Orang Pinjam)</option>
                </select>
                <input type="date" id="d-date" class="w-full p-4 bg-slate-100 border-none rounded-2xl outline-none">
                <input type="text" id="d-name" class="w-full p-4 bg-slate-100 border-none rounded-2xl outline-none" placeholder="Nama Orang">
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 font-bold text-slate-400">Rp</span>
                    <input type="number" id="d-amount" class="w-full p-4 pl-12 bg-slate-100 border-none rounded-2xl outline-none font-bold" placeholder="0">
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="closeModal()" class="flex-1 py-4 bg-slate-100 rounded-2xl font-bold">Batal</button>
                    <button onclick="saveDebt()" class="flex-1 py-4 bg-orange-600 text-white rounded-2xl font-bold shadow-lg">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxGPhxTbFFljj1fxq0fBdaW_ocvLzna-0FwDj2iFxEXdYYdQbg0miFuiQas2_KhJnv1/exec"; 
        
        let dataStore = { transactions: [], debts: [] };
        let editMode = { active: false, id: null };
        let activeDebtFilter = 'all';
        let currentTab = 'transactions';
        let autoSyncInterval; // Timer untuk sinkronisasi otomatis

        window.onload = () => { 
            lucide.createIcons(); 
            resetFilters(); 
        };

        function showLoader(show) { document.getElementById('global-loader').style.display = show ? 'flex' : 'none'; }

        async function handleLogin() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').classList.remove('hidden');
            await loadInitialData();
            
            // Mulai Auto-Sync setiap 30 detik
            startAutoSync();
        }

        function logout() { 
            stopAutoSync();
            location.reload(); 
        }

        // --- CORE SYNC LOGIC ---

        async function loadInitialData() {
            showLoader(true);
            try {
                const res = await fetch(SCRIPT_URL);
                dataStore = await res.json();
                refreshUI();
            } catch (e) { alert("Gagal mengambil data."); }
            showLoader(false);
        }

        // Sinkronisasi tanpa memblokir layar (Silent)
        async function silentSync() {
            try {
                const res = await fetch(SCRIPT_URL);
                const newData = await res.json();
                
                // Cek apakah data benar-benar berubah sebelum render ulang
                if (JSON.stringify(newData) !== JSON.stringify(dataStore)) {
                    dataStore = newData;
                    refreshUI();
                    console.log("Auto-synced successfully");
                }
            } catch (e) { console.warn("Silent sync failed", e); }
        }

        function startAutoSync() {
            if(autoSyncInterval) clearInterval(autoSyncInterval);
            autoSyncInterval = setInterval(silentSync, 30000); // 30 detik
        }

        function stopAutoSync() {
            if(autoSyncInterval) clearInterval(autoSyncInterval);
        }

        function refreshUI() {
            renderTransactions();
            renderDebts();
            if(currentTab === 'analytics') renderCharts();
            lucide.createIcons();
        }

        function resetFilters() {
            const now = new Date();
            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
            const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).toISOString().split('T')[0];
            document.getElementById('filter-start').value = firstDay;
            document.getElementById('filter-end').value = lastDay;
            if(dataStore.transactions && dataStore.transactions.length > 0) renderTransactions();
        }

        function renderTransactions() {
            const start = document.getElementById('filter-start').value;
            const end = document.getElementById('filter-end').value;
            const container = document.getElementById('transaction-list-mobile');
            
            const filtered = dataStore.transactions.filter(t => {
                const d = t.dateRaw;
                return d >= start && d <= end;
            }).sort((a,b) => new Date(b.dateRaw) - new Date(a.dateRaw));

            const inc = filtered.filter(t => t.type === 'pemasukan').reduce((a, b) => a + Number(b.amount), 0);
            const exp = filtered.filter(t => t.type === 'pengeluaran').reduce((a, b) => a + Number(b.amount), 0);
            document.getElementById('total-balance').innerText = `Rp ${(inc - exp).toLocaleString('id-ID')}`;
            document.getElementById('total-income').innerText = `Rp ${inc.toLocaleString('id-ID')}`;
            document.getElementById('total-expense').innerText = `Rp ${exp.toLocaleString('id-ID')}`;

            window.currentFilteredData = filtered;

            if(filtered.length === 0) {
                container.innerHTML = '<div class="text-center py-10 opacity-30 font-bold">Tidak ada data di periode ini</div>';
                return;
            }

            container.innerHTML = filtered.map(t => `
                <div class="bg-white p-4 rounded-3xl flex items-center gap-3 shadow-sm border border-slate-50">
                    <div onclick="openEdit('${t.id}')" class="flex-1 flex items-center gap-3 active:opacity-50 transition">
                        <div class="w-10 h-10 rounded-xl flex items-center justify-center ${t.type === 'pemasukan' ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'}">
                            <i data-lucide="${t.type === 'pemasukan' ? 'arrow-down-left' : 'arrow-up-right'}" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <h5 class="font-bold text-sm text-slate-800 leading-tight">${t.note}</h5>
                            <p class="text-[10px] text-slate-400 font-medium">${t.category} • ${t.dateDisplay}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-sm ${t.type === 'pemasukan' ? 'text-green-600' : 'text-red-600'}">${Number(t.amount).toLocaleString('id-ID')}</p>
                        <button onclick="deleteItem('transactions', '${t.id}')" class="text-[10px] text-slate-300 font-bold">HAPUS</button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function filterDebtTab(type) {
            activeDebtFilter = type;
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            document.getElementById(`d-chip-${type}`).classList.add('active');
            renderDebts();
        }

        function renderDebts() {
            const container = document.getElementById('debt-list-mobile');
            const filtered = dataStore.debts.filter(d => activeDebtFilter === 'all' || d.type === activeDebtFilter);
            
            const u = dataStore.debts.filter(d => d.type === 'utang').reduce((a, b) => a + Number(b.amount), 0);
            const p = dataStore.debts.filter(d => d.type === 'piutang').reduce((a, b) => a + Number(b.amount), 0);
            document.getElementById('total-debt-sum').innerText = `Rp ${u.toLocaleString('id-ID')}`;
            document.getElementById('total-receivable-sum').innerText = `Rp ${p.toLocaleString('id-ID')}`;

            if(filtered.length === 0) {
                container.innerHTML = '<div class="text-center py-10 opacity-30 font-bold">Kosong</div>';
                return;
            }

            container.innerHTML = filtered.map(d => `
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-50 flex justify-between items-center">
                    <div onclick="openEditDebt('${d.id}')" class="flex-1 active:opacity-50 transition cursor-pointer">
                        <p class="text-[9px] font-black uppercase tracking-widest ${d.type === 'utang' ? 'text-red-400' : 'text-blue-400'}">${d.type}</p>
                        <h5 class="font-bold text-slate-800">${d.name}</h5>
                        <p class="text-[10px] text-slate-400 mb-1">${d.dateRaw || ''}</p>
                        <p class="font-black text-lg">Rp ${Number(d.amount).toLocaleString('id-ID')}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="payDebt('${d.id}')" class="bg-green-500 text-white px-3 py-2 rounded-xl text-[10px] font-black shadow-md active:scale-95">LUNAS</button>
                        <button onclick="deleteItem('debts', '${d.id}')" class="text-slate-200 p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // --- CRUD LOGIC ---

        async function saveTransaction() {
            const amount = document.getElementById('t-amount').value;
            const date = document.getElementById('t-date').value;
            if(!amount || !date) return;
            showLoader(true);
            const dateDisp = new Date(date).toLocaleDateString('id-ID', {day:'numeric', month:'short', year:'numeric'});
            const id = editMode.active ? editMode.id : Date.now();
            const row = [id, date, dateDisp, document.getElementById('t-type').value, amount, document.getElementById('t-category').value || 'Umum', document.getElementById('t-note').value || '-'];
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: editMode.active ? 'update' : 'add', sheet: 'transactions', id: id, row: row })});
            await loadInitialData();
            closeModal();
        }

        async function saveDebt() {
            const amount = document.getElementById('d-amount').value;
            const name = document.getElementById('d-name').value;
            const date = document.getElementById('d-date').value || new Date().toISOString().split('T')[0];
            const type = document.getElementById('d-type').value;

            if(!amount || !name) return;
            showLoader(true);
            const id = editMode.active ? editMode.id : Date.now();
            const row = [id, type, name, amount, date];

            await fetch(SCRIPT_URL, { 
                method: 'POST', 
                body: JSON.stringify({ 
                    action: editMode.active ? 'update' : 'add', 
                    sheet: 'debts', 
                    id: id, 
                    row: row 
                })
            });
            await loadInitialData();
            closeModal();
        }

        async function payDebt(id) {
            const d = dataStore.debts.find(i => i.id == id);
            if(!confirm(`Lunaskan pinjaman ${d.name} senilai Rp ${Number(d.amount).toLocaleString('id-ID')}?`)) return;
            showLoader(true);
            const typeT = (d.type === 'utang') ? 'pengeluaran' : 'pemasukan';
            const today = new Date().toISOString().split('T')[0];
            const disp = new Date().toLocaleDateString('id-ID', {day:'numeric', month:'short', year:'numeric'});
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'add', sheet: 'transactions', row: [Date.now(), today, disp, typeT, d.amount, 'Pelunasan', `Lunas: ${d.name}`] })});
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', sheet: 'debts', id: id })});
            await loadInitialData();
        }

        async function deleteItem(sheet, id) {
            if(!confirm("Hapus data ini?")) return;
            showLoader(true);
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', sheet: sheet, id: id }) });
            await loadInitialData();
        }

        // --- UI TOOLS ---
        function switchTab(viewId) {
            currentTab = viewId;
            document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${viewId}`).classList.remove('hidden');
            document.getElementById('home-balance-card').style.display = (viewId === 'transactions') ? 'block' : 'none';
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.replace('nav-item-active', 'text-slate-400');
                if(btn.dataset.view === viewId) btn.classList.replace('text-slate-400', 'nav-item-active');
            });
            if(viewId === 'analytics') renderCharts();
            lucide.createIcons();
        }

        function openModal(type) {
            document.getElementById('modal-overlay').classList.remove('hidden');
            document.getElementById(`modal-${type}`).classList.remove('hidden');
            if(!editMode.active) {
                if(type === 'transaction') document.getElementById('t-date').value = new Date().toISOString().split('T')[0];
                if(type === 'debt') document.getElementById('d-date').value = new Date().toISOString().split('T')[0];
            }
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.add('hidden');
            document.querySelectorAll('.modal-animate').forEach(m => m.classList.add('hidden'));
            editMode = { active: false, id: null };
            
            // Reset Transaction Form
            document.getElementById('modal-t-title').innerText = "Tambah Transaksi";
            document.getElementById('t-amount').value = '';
            document.getElementById('t-note').value = '';
            
            // Reset Debt Form
            document.getElementById('modal-d-title').innerText = "Catat Pinjaman";
            document.getElementById('d-amount').value = '';
            document.getElementById('d-name').value = '';
        }

        function setModalType(type) {
            document.getElementById('t-type').value = type;
            const inc = document.getElementById('type-inc'), exp = document.getElementById('type-exp');
            if(type === 'pemasukan') {
                inc.className = "flex-1 py-3 rounded-xl text-sm font-bold bg-white shadow-sm";
                exp.className = "flex-1 py-3 rounded-xl text-sm font-bold text-slate-400";
            } else {
                exp.className = "flex-1 py-3 rounded-xl text-sm font-bold bg-white shadow-sm";
                inc.className = "flex-1 py-3 rounded-xl text-sm font-bold text-slate-400";
            }
        }

        function openEdit(id) {
            const t = dataStore.transactions.find(item => item.id == id);
            editMode = { active: true, id: id };
            document.getElementById('modal-t-title').innerText = "Edit Transaksi";
            document.getElementById('t-amount').value = t.amount;
            document.getElementById('t-date').value = t.dateRaw;
            document.getElementById('t-category').value = t.category;
            document.getElementById('t-note').value = t.note;
            setModalType(t.type);
            openModal('transaction');
        }

        function openEditDebt(id) {
            const d = dataStore.debts.find(item => item.id == id);
            editMode = { active: true, id: id };
            document.getElementById('modal-d-title').innerText = "Edit Pinjaman";
            document.getElementById('d-type').value = d.type;
            document.getElementById('d-name').value = d.name;
            document.getElementById('d-amount').value = d.amount;
            document.getElementById('d-date').value = d.dateRaw || new Date().toISOString().split('T')[0];
            openModal('debt');
        }

        function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const start = document.getElementById('filter-start').value;
            const end = document.getElementById('filter-end').value;

            doc.setFontSize(18);
            doc.text("Laporan Keuangan Finance Pro", 14, 20);
            doc.setFontSize(10);
            doc.text(`Periode: ${start} s/d ${end}`, 14, 28);

            const body = (window.currentFilteredData || []).map(t => [
                t.dateDisplay, t.category, t.note, 
                t.type === 'pemasukan' ? `+${Number(t.amount)}` : `-${Number(t.amount)}`
            ]);

            doc.autoTable({
                startY: 35,
                head: [['Tanggal', 'Kategori', 'Keterangan', 'Jumlah']],
                body: body,
                headStyles: { fillColor: [59, 130, 246] }
            });
            doc.save(`Laporan_${start}_to_${end}.pdf`);
        }

        let mChart;
        function renderCharts() {
            const canvas = document.getElementById('monthlyChart');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            if(mChart) mChart.destroy();
            const inc = dataStore.transactions.filter(t=>t.type==='pemasukan').reduce((a,b)=>a+Number(b.amount),0);
            const exp = dataStore.transactions.filter(t=>t.type==='pengeluaran').reduce((a,b)=>a+Number(b.amount),0);
            mChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Masuk', 'Keluar'],
                    datasets: [{ data: [inc, exp], backgroundColor: ['#10b981', '#ef4444'], borderWidth: 0 }]
                },
                options: { cutout: '70%', plugins: { legend: { position: 'bottom' } } }
            });
        }
    </script>
</body>
</html>
