
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>My-Finance PRO v2</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.dark body{background:#0f172a;color:white}
</style>

</head>

<body class="bg-gray-100">

<div class="max-w-6xl mx-auto p-4">

<div class="flex justify-between items-center mb-4">
<h1 class="text-2xl font-bold">My‑Finance PRO v2</h1>
<button onclick="toggleDark()" class="border px-3 py-1 rounded">Dark Mode</button>
</div>

<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">

<div class="bg-white p-3 rounded shadow">
<div class="text-sm">Total</div>
<div id="saldoTotal" class="text-xl font-bold">0</div>
</div>

<div class="bg-white p-3 rounded shadow">
<div class="text-sm">Cash</div>
<div id="saldoCash" class="text-xl font-bold">0</div>
</div>

<div class="bg-white p-3 rounded shadow">
<div class="text-sm">Bank</div>
<div id="saldoBank" class="text-xl font-bold">0</div>
</div>

<div class="bg-white p-3 rounded shadow">
<div class="text-sm">E‑Wallet</div>
<div id="saldoEwallet" class="text-xl font-bold">0</div>
</div>

</div>

<div class="bg-white p-4 rounded shadow mb-6">

<h2 class="font-semibold mb-2">Tambah Transaksi</h2>

<div class="grid md:grid-cols-7 gap-2">

<select id="type" class="border p-2 rounded">
<option value="income">Pemasukan</option>
<option value="expense">Pengeluaran</option>
</select>

<input id="kategori" class="border p-2 rounded" placeholder="Kategori">

<select id="wallet" class="border p-2 rounded">
<option>Cash</option>
<option>Bank</option>
<option>E‑Wallet</option>
</select>

<input id="jumlah" type="number" class="border p-2 rounded" placeholder="Jumlah">

<input id="catatan" class="border p-2 rounded" placeholder="Catatan">

<input id="tanggal" type="date" class="border p-2 rounded">

<button onclick="addTx()" class="bg-black text-white rounded px-4">Simpan</button>

</div>

</div>

<div class="bg-white p-4 rounded shadow mb-6">

<div class="flex gap-2 mb-3">

<input id="search" placeholder="Cari transaksi..." class="border p-2 rounded w-full">

<input id="start" type="date" class="border p-2 rounded">

<input id="end" type="date" class="border p-2 rounded">

<button onclick="render()" class="border px-3">Filter</button>

<button onclick="exportCSV()" class="border px-3">Export CSV</button>

</div>

</div>

<div class="bg-white p-4 rounded shadow mb-6">

<h2 class="font-semibold mb-3">Grafik Keuangan</h2>
<canvas id="chart"></canvas>

</div>

<div class="bg-white p-4 rounded shadow">

<h2 class="font-semibold mb-3">Riwayat Transaksi</h2>

<table class="w-full text-sm">

<thead>
<tr class="border-b">
<th>Tanggal</th>
<th>Kategori</th>
<th>Wallet</th>
<th>Jumlah</th>
<th></th>
</tr>
</thead>

<tbody id="txTable"></tbody>

</table>

</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("finance_data_v2") || "[]")

function save(){
localStorage.setItem("finance_data_v2",JSON.stringify(data))
}

function rupiah(n){
return new Intl.NumberFormat('id-ID').format(n)
}

function addTx(){

const type=document.getElementById("type").value
const kategori=document.getElementById("kategori").value
const wallet=document.getElementById("wallet").value
const jumlah=parseInt(document.getElementById("jumlah").value||0)
const catatan=document.getElementById("catatan").value
const tanggal=document.getElementById("tanggal").value || new Date().toISOString().split("T")[0]

if(!jumlah)return alert("Jumlah kosong")

data.push({
date:tanggal,
type,
kategori,
wallet,
jumlah,
catatan
})

save()
render()

}

function del(i){
data.splice(i,1)
save()
render()
}

function filtered(){

let s=document.getElementById("search").value.toLowerCase()
let start=document.getElementById("start").value
let end=document.getElementById("end").value

return data.filter(t=>{

if(s && !t.kategori.toLowerCase().includes(s)) return false

if(start && t.date < start) return false

if(end && t.date > end) return false

return true

})

}

function render(){

let cash=0
let bank=0
let ewallet=0

let html=""

let list=filtered()

list.forEach((t,i)=>{

let amt=t.jumlah

if(t.type==="expense") amt*=-1

if(t.wallet==="Cash") cash+=amt
if(t.wallet==="Bank") bank+=amt
if(t.wallet==="E‑Wallet") ewallet+=amt

html+=`
<tr class="border-b">
<td>${t.date}</td>
<td>${t.kategori}</td>
<td>${t.wallet}</td>
<td>${rupiah(t.jumlah)}</td>
<td><button onclick="del(${i})">hapus</button></td>
</tr>
`

})

document.getElementById("txTable").innerHTML=html

document.getElementById("saldoCash").innerText=rupiah(cash)
document.getElementById("saldoBank").innerText=rupiah(bank)
document.getElementById("saldoEwallet").innerText=rupiah(ewallet)
document.getElementById("saldoTotal").innerText=rupiah(cash+bank+ewallet)

renderChart(list)

}

function renderChart(list){

let income=0
let expense=0

list.forEach(t=>{

if(t.type==="income") income+=t.jumlah
if(t.type==="expense") expense+=t.jumlah

})

const ctx=document.getElementById("chart")

if(window.chart) window.chart.destroy()

window.chart=new Chart(ctx,{
type:"pie",
data:{
labels:["Pemasukan","Pengeluaran"],
datasets:[{data:[income,expense]}]
}
})

}

function exportCSV(){

let csv="Tanggal,Kategori,Wallet,Jumlah,Catatan\n"

data.forEach(t=>{

csv+=`${t.date},${t.kategori},${t.wallet},${t.jumlah},${t.catatan}\n`

})

let blob=new Blob([csv])

let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="laporan_keuangan.csv"
a.click()

}

function toggleDark(){

document.body.classList.toggle("bg-gray-900")
document.body.classList.toggle("text-white")

}

render()

</script>

</body>
</html>
