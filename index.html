<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>My-Finance</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<style>
body{-webkit-tap-highlight-color:transparent}
.glass{background:rgba(255,255,255,.9);backdrop-filter:blur(12px)}
.nav-item-active{color:#3b82f6}
.nav-item-active i{transform:translateY(-4px);transition:.3s}
.safe-area-bottom{padding-bottom:env(safe-area-inset-bottom)}
.loading-overlay{background:rgba(255,255,255,.8);position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px}
</style>
</head>

<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">

<div id="global-loader" class="hidden loading-overlay">
<div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
<p class="text-xs font-bold text-blue-600 animate-pulse">Mohon Tunggu...</p>
</div>

<div id="login-screen" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center p-6">
<div class="text-center">
<h1 class="text-3xl font-bold">Finance Pro</h1>
<p class="text-slate-400 mt-2 mb-8">Kelola keuangan dengan Google Sheets</p>
<button onclick="handleLogin()" class="bg-blue-600 text-white py-4 px-8 rounded-2xl font-bold">Masuk</button>
</div>
</div>

<div id="main-app" class="hidden pb-32">

<header class="glass sticky top-0 z-40 px-5 py-4 flex justify-between items-center border-b">
<span class="font-bold text-lg">My-Finance</span>
<button onclick="logout()" class="text-sm text-red-500 font-bold">Logout</button>
</header>

<main class="p-5 space-y-6">

<div class="bg-blue-600 rounded-3xl p-6 text-white">
<p class="text-sm opacity-70">Saldo</p>
<h2 id="total-balance" class="text-3xl font-bold">Rp 0</h2>

<div class="grid grid-cols-2 gap-3 mt-4">
<div>
<p class="text-xs">Pemasukan</p>
<p id="total-income">Rp 0</p>
</div>

<div>
<p class="text-xs">Pengeluaran</p>
<p id="total-expense">Rp 0</p>
</div>
</div>
</div>

<div class="bg-white p-4 rounded-3xl shadow-sm border space-y-3">

<div class="flex items-center gap-2">
<input type="date" id="filter-start" onchange="renderTransactions()" class="flex-1 p-2 bg-slate-100 rounded">
<input type="date" id="filter-end" onchange="renderTransactions()" class="flex-1 p-2 bg-slate-100 rounded">
</div>

<button onclick="exportToPDF()" class="w-full bg-slate-800 text-white py-2 rounded text-xs font-bold">
Export PDF
</button>

</div>

<div id="transaction-list-mobile" class="space-y-3"></div>

</main>

<nav class="fixed bottom-0 left-0 right-0 glass border-t flex justify-around p-3">
<button onclick="openModal()" class="bg-blue-600 text-white px-6 py-3 rounded-full font-bold">+</button>
</nav>

</div>

<div id="modal-overlay" class="fixed inset-0 bg-black/40 hidden z-50 flex items-end">

<div id="modal-transaction" class="bg-white w-full p-6">

<h3 class="text-lg font-bold mb-4">Tambah Transaksi</h3>

<input type="hidden" id="t-type" value="pemasukan">

<div class="flex gap-2 mb-3">
<button onclick="setModalType('pemasukan')" class="flex-1 bg-green-500 text-white py-2 rounded">Masuk</button>
<button onclick="setModalType('pengeluaran')" class="flex-1 bg-red-500 text-white py-2 rounded">Keluar</button>
</div>

<input type="date" id="t-date" class="w-full mb-2 p-3 bg-slate-100 rounded">

<input type="number" id="t-amount" placeholder="Nominal" class="w-full mb-2 p-3 bg-slate-100 rounded">

<input type="text" id="t-category" placeholder="Kategori" class="w-full mb-2 p-3 bg-slate-100 rounded">

<input type="text" id="t-note" placeholder="Keterangan" class="w-full mb-3 p-3 bg-slate-100 rounded">

<select id="t-wallet" class="w-full mb-4 p-3 bg-slate-100 rounded">
<option>Cash</option>
<option>Bank</option>
<option>E-Wallet</option>
</select>

<div class="flex gap-3">
<button onclick="closeModal()" class="flex-1 bg-gray-200 py-3 rounded">Batal</button>
<button onclick="saveTransaction()" class="flex-1 bg-blue-600 text-white py-3 rounded">Simpan</button>
</div>

</div>
</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxL-mUHOmsA2TtmmGPjow_LhIZo-dkzsUyUnEaX2CekBbmD1qSvLepBxYYxFO4_ugk/exec";

let dataStore={transactions:[]};
let autoSyncInterval;

function showLoader(s){
document.getElementById("global-loader").style.display=s?"flex":"none";
}

async function handleLogin(){
document.getElementById("login-screen").style.display="none";
document.getElementById("main-app").classList.remove("hidden");
await loadInitialData();
startAutoSync();
}

function logout(){
stopAutoSync();
location.reload();
}

async function loadInitialData(){

showLoader(true);

try{

const res=await fetch(SCRIPT_URL);
dataStore=await res.json();

}catch(e){

console.error(e);

}finally{

showLoader(false);
refreshUI();

}

}

function startAutoSync(){

if(autoSyncInterval)clearInterval(autoSyncInterval);
autoSyncInterval=setInterval(silentSync,30000);

}

function stopAutoSync(){
if(autoSyncInterval)clearInterval(autoSyncInterval);
}

async function silentSync(){

try{

const res=await fetch(SCRIPT_URL);
const newData=await res.json();

if(JSON.stringify(newData)!==JSON.stringify(dataStore)){

dataStore=newData;
refreshUI();

}

}catch(e){

console.warn("sync fail");

}

}

function refreshUI(){

renderTransactions();

}

function renderTransactions(){

const start=document.getElementById("filter-start").value;
const end=document.getElementById("filter-end").value;

const container=document.getElementById("transaction-list-mobile");

if(!dataStore.transactions){

container.innerHTML="";
return;

}

const filtered=dataStore.transactions.filter(t=>{

const d=t.dateRaw||(Array.isArray(t)?t[1]:null);

if(!d)return false;

if(start && d<start)return false;
if(end && d>end)return false;

return true;

});

let inc=0;
let exp=0;

filtered.forEach(t=>{

const amt=Number(t.amount||(Array.isArray(t)?t[4]:0))||0;
const type=t.type||(Array.isArray(t)?t[3]:"");

if(type==="pemasukan")inc+=amt;
if(type==="pengeluaran")exp+=amt;

});

document.getElementById("total-income").innerText="Rp "+inc.toLocaleString("id-ID");
document.getElementById("total-expense").innerText="Rp "+exp.toLocaleString("id-ID");
document.getElementById("total-balance").innerText="Rp "+(inc-exp).toLocaleString("id-ID");

window.currentFilteredData=filtered;

if(filtered.length===0){

container.innerHTML="<div class='text-center text-sm opacity-40'>Tidak ada transaksi</div>";
return;

}

container.innerHTML=filtered.map(t=>{

const type=t.type||(Array.isArray(t)?t[3]:"");
const note=t.note||(Array.isArray(t)?t[6]:"-");
const amt=Number(t.amount||(Array.isArray(t)?t[4]:0));

return `
<div class="bg-white p-4 rounded-xl flex justify-between shadow-sm border">
<div>
<p class="font-bold">${note}</p>
</div>
<div class="${type==="pemasukan"?"text-green-600":"text-red-600"} font-bold">
${amt.toLocaleString("id-ID")}
</div>
</div>`

}).join("");

}

function openModal(){

document.getElementById("modal-overlay").classList.remove("hidden");

const today=new Date().toISOString().split("T")[0];
document.getElementById("t-date").value=today;

}

function closeModal(){

document.getElementById("modal-overlay").classList.add("hidden");

document.getElementById("t-amount").value="";
document.getElementById("t-category").value="";
document.getElementById("t-note").value="";

setModalType("pemasukan");

}

function setModalType(type){

document.getElementById("t-type").value=type;

}

async function saveTransaction(){

const amount=document.getElementById("t-amount").value;
const date=document.getElementById("t-date").value;

if(!amount || !date)return;

showLoader(true);

const dateDisp=new Date(date).toLocaleDateString("id-ID");

const row=[
Date.now().toString(),
date,
dateDisp,
document.getElementById("t-type").value,
amount,
document.getElementById("t-category").value||"Umum",
document.getElementById("t-note").value||"-",
document.getElementById("t-wallet").value
];

try{

await fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({action:"add",sheet:"transactions",row:row})
});

await loadInitialData();

closeModal();

}catch(e){

console.error(e);

}finally{

showLoader(false);

}

}

function exportToPDF(){

renderTransactions();

const {jsPDF}=window.jspdf;
const doc=new jsPDF();

doc.text("Laporan Keuangan",14,20);

const tableData=(window.currentFilteredData||[]).map(t=>[
t.dateDisplay||t[2],
t.category||t[5],
t.note||t[6],
(t.type==="pengeluaran"?"-":"+")+(Number(t.amount||t[4]).toLocaleString("id-ID"))
]);

doc.autoTable({
startY:30,
head:[["Tanggal","Kategori","Keterangan","Jumlah"]],
body:tableData
});

doc.save("laporan-keuangan.pdf");

}

window.onload=()=>{

const now=new Date();
const first=new Date(now.getFullYear(),now.getMonth(),1).toISOString().split("T")[0];
const last=new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().split("T")[0];

document.getElementById("filter-start").value=first;
document.getElementById("filter-end").value=last;

};

</script>

</body>
</html>
